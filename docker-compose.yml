services:
  tags:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DISCORD_APP_ID=${DISCORD_APP_ID}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - PORT=8020
    networks:
      - caddy
      - tags
    labels:
      caddy_0: tags.b1.buape.com
      caddy_0.reverse_proxy: "{{upstreams 8020}}"

  db:
    image: postgres:17
    restart: always
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    volumes:
      - "tags-db:/var/lib/postgresql/data"
    networks:
      - tags
    ports:
      - "41006:5432"
    command: ["postgres", "-c", "log_statement=ddl", "-c", "log_destination=stderr"]

  postgres-backup:
    image: itbm/postgres-backup-s3
    networks:
      - tags
    depends_on:
      - db
    environment:
      - S3_ACCESS_KEY_ID=${S3_KEY}
      - S3_SECRET_ACCESS_KEY=${S3_PASS}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PREFIX=tags
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - POSTGRES_DATABASE=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_HOST=db
      - SCHEDULE=@hourly

volumes:
  tags-db:

networks:
  caddy:
    external: true
  tags:
    external: true
